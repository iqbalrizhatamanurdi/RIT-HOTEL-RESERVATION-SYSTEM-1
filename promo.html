<!DOCTYPE html>
<html class="scroll-smooth" lang="id">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>RIT Hotel Hotel Yogyakarta | Penawaran Kupon Promo & Diskon</title>
    <!-- Tailwind CSS with Forms plugin -->
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <!-- Google Fonts Poppins & Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel CDN for JSX processing in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#000613",
                        secondary: "#D4AF37",
                        "secondary-dark": "#AA7C11",
                        surface: "#F9FAFC",
                        "on-surface-variant": "#64748B"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const defaultPromos = [
            { id: 1, code: "VISTASUMMER", title: "Promo Liburan Musim Panas", discount_percentage: 15, description: "Dapatkan potongan harga 15% untuk semua tipe suite dengan pemesanan minimal 3 malam.", valid_until: "2026-08-31", image: "https://images.unsplash.com/photo-1571896349842-33c89424de2d?auto=format&fit=crop&q=80&w=600" },
            { id: 2, code: "HONEYMOON", title: "Paket Romantis Bulan Madu", discount_percentage: 20, description: "Diskon 20% khusus Kamar Suite dengan fasilitas makan malam romantis gratis.", valid_until: "2026-12-31", image: "https://images.unsplash.com/photo-1544124499-58912cbddaad?auto=format&fit=crop&q=80&w=600" }
        ];

        function App() {
            const [promos, setPromos] = useState([]);
            const [copiedCode, setCopiedCode] = useState(null);

            useEffect(() => {
                const storedPromos = localStorage.getItem("promos_db");
                if (!storedPromos) {
                    localStorage.setItem("promos_db", JSON.stringify(defaultPromos));
                    setPromos(defaultPromos);
                } else {
                    setPromos(JSON.parse(storedPromos));
                }
            }, []);

            const copyCode = (code) => {
                navigator.clipboard.writeText(code);
                setCopiedCode(code);
                setTimeout(() => setCopiedCode(null), 2000);
            };

            return (
                <div className="flex flex-col min-h-screen">
                    <header className="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 md:px-12 py-4 bg-white/95 backdrop-blur-md border-b border-slate-100 shadow-sm">
                        <a className="text-2xl font-bold tracking-wider text-primary flex items-center gap-2 font-serif" href="index.html">
                            <span className="text-secondary">RIT</span><span>Hotel</span>
                        </a>
                        <nav className="hidden lg:flex items-center gap-8">
                            <a className="font-medium text-sm text-on-surface-variant hover:text-secondary py-1" href="index.html">Beranda</a>
                            <a className="font-medium text-sm text-on-surface-variant hover:text-secondary py-1" href="daftar_kamar.html">Kamar & Suite</a>
                            <a className="font-semibold text-sm text-secondary border-b-2 border-secondary py-1" href="promo.html">Promo</a>
                            <a className="font-medium text-sm text-on-surface-variant hover:text-secondary py-1" href="news.html">Kabar</a>
                            <a className="font-medium text-sm text-on-surface-variant hover:text-secondary py-1" href="gallery.html">Galeri</a>
                            <a className="font-medium text-sm text-on-surface-variant hover:text-secondary py-1" href="kontak.html">Hubungi Kami</a>
                            <a className="font-medium text-sm text-on-surface-variant hover:text-secondary py-1 font-bold px-3 py-1 bg-amber-50 rounded-lg border border-amber-200" href="api_data.html">API Page (Axios)</a>
                        </nav>
                        <a href="booking.html" className="bg-primary text-white hover:bg-secondary hover:text-primary transition-all px-6 py-2.5 rounded-full text-sm font-bold shadow-md">Pesan</a>
                    </header>

                    <main className="flex-grow pt-28 max-w-7xl mx-auto px-6 w-full pb-24 space-y-12">
                        <div className="text-center space-y-3">
                            <span className="text-secondary font-bold text-xs uppercase tracking-widest block">Penawaran Potongan Harga</span>
                            <h2 className="font-serif text-3xl md:text-5xl font-bold text-primary">Kupon & Promo Aktif</h2>
                            <p className="text-xs md:text-sm text-slate-500 font-light max-w-lg mx-auto">
                                Gunakan kode voucher di bawah saat memesan untuk menikmati potongan biaya premium khusus pelanggan RIT Hotel.
                            </p>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            {promos.map((p) => (
                                <div key={p.id} className="bg-white rounded-3xl overflow-hidden border border-slate-100 shadow-sm hover:shadow-md transition-all flex flex-col md:flex-row">
                                    <div className="h-48 md:h-auto md:w-48 overflow-hidden relative">
                                        <img src={p.image || 'https://images.unsplash.com/photo-1571896349842-33c89424de2d?auto=format&fit=crop&q=80&w=600'} className="w-full h-full object-cover" alt={p.title} />
                                        <span className="absolute top-4 left-4 bg-primary text-secondary font-bold text-xs px-3 py-1 rounded-full shadow-md">{p.discount_percentage}% OFF</span>
                                    </div>
                                    
                                    <div className="p-6 space-y-4 flex-grow flex flex-col justify-between text-xs">
                                        <div className="space-y-2">
                                            <h3 className="font-bold text-base text-primary font-serif">{p.title}</h3>
                                            <p className="text-slate-400 font-light leading-relaxed">{p.description}</p>
                                            <p className="text-[10px] text-slate-500 font-medium">Masa berlaku sampai: <span className="text-red-500 font-semibold">{new Date(p.valid_until).toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year: 'numeric'})}</span></p>
                                        </div>

                                        <div className="flex gap-2 items-center">
                                            <div className="bg-slate-50 border border-slate-100 rounded-xl px-4 py-2.5 font-mono font-bold text-primary text-center flex-grow flex items-center justify-between">
                                                <span>{p.code}</span>
                                                <button onClick={() => copyCode(p.code)} className="text-secondary font-bold uppercase tracking-wider hover:underline ml-2 text-[10px]">
                                                    {copiedCode === p.code ? 'Copied!' : 'Copy'}
                                                </button>
                                            </div>
                                            <a href={`booking.html?promo=${p.code}`} className="bg-primary hover:bg-secondary text-white hover:text-primary transition-all px-4 py-3 rounded-xl font-bold uppercase tracking-wider shadow-sm flex items-center justify-center">
                                                Gunakan
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    <footer className="bg-primary text-white border-t border-slate-900 mt-24">
                        <div className="border-t border-slate-900 py-6 text-center text-[10px] text-slate-500 font-light">
                            &copy; 2026 RIT Hotel Hotel Yogyakarta. Seluruh Hak Cipta Dilindungi. Tugas UTS Pemrograman Web - Kelompok 4.
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
