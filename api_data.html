<!DOCTYPE html>
<html class="scroll-smooth" lang="id">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>RIT Hotel Hotel Yogyakarta | API Data Fetching (Axios)</title>
    <!-- Tailwind CSS with Forms plugin -->
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <!-- Google Fonts Poppins & Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel CDN for JSX processing in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Axios CDN library -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body {
            font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#000613",
                        secondary: "#D4AF37",
                        "secondary-dark": "#AA7C11",
                        surface: "#F9FAFC",
                        "on-surface-variant": "#64748B"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [products, setProducts] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [errorMsg, setErrorMsg] = useState("");

            // React useEffect hook for fetching data using Axios (Axios 15-point UTS requirement)
            useEffect(() => {
                const fetchData = async () => {
                    try {
                        setLoading(true);
                        // Fetching exactly 10 items from public Fake Store API using Axios
                        const response = await axios.get("https://fakestoreapi.com/products?limit=10");
                        setProducts(response.data);
                        
                        // Artificial delay (800ms) to showcase the premium Shimmer loading skeleton effect
                        setTimeout(() => {
                            setLoading(false);
                        }, 800);

                    } catch (err) {
                        setErrorMsg("Gagal memuat data dari API publik. Silakan coba kembali.");
                        setLoading(false);
                    }
                };

                fetchData();
            }, []);

            const formatRupiah = (usdValue) => {
                // Approximate USD to IDR conversion
                const converted = Math.round(usdValue * 15500);
                return 'Rp ' + new Intl.NumberFormat('id-ID').format(converted);
            };

            return (
                <div className="flex flex-col min-h-screen">
                    <header className="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 md:px-12 py-4 bg-white/95 backdrop-blur-md border-b border-slate-100 shadow-sm">
                        <a className="text-2xl font-bold tracking-wider text-primary flex items-center gap-2 font-serif" href="index.html">
                            <span className="text-secondary">RIT</span><span> Hotel</span>
                        </a>
                        <a href="index.html" className="text-slate-600 hover:text-secondary text-sm font-semibold transition-colors flex items-center gap-1">
                            <span className="material-symbols-outlined text-sm">home</span> Kembali Ke Home
                        </a>
                    </header>

                    <main className="flex-grow pt-28 max-w-7xl mx-auto px-6 md:px-12 w-full pb-24 space-y-12">
                        {/* Title header */}
                        <div className="space-y-4">
                            <span className="text-secondary font-bold text-xs uppercase tracking-widest block">Integrasi Axios & API Publik</span>
                            <h2 className="font-serif text-3xl md:text-5xl font-bold text-primary">Koleksi Rekomendasi Suvenir</h2>
                            <p className="text-xs md:text-sm text-slate-500 font-light max-w-xl">
                                Halaman ini memanggil 10 data eksternal secara asinkron dari Fake Store API menggunakan pustaka Axios, didukung visual transisi shimmer loader yang halus.
                            </p>
                        </div>

                        {/* Error Handling State */}
                        {errorMsg && (
                            <div className="bg-red-50 text-red-800 p-4 border-l-4 border-red-500 rounded-xl text-xs font-bold uppercase tracking-wider">
                                {errorMsg}
                            </div>
                        )}

                        {/* Grid container with Conditional Rendering */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {loading ? (
                                /* Conditional Rendering: Shimmer Skeleton loaders while dynamic fetching in progress */
                                Array(6).fill(0).map((_, i) => (
                                    <div key={i} className="bg-white border border-slate-100 p-6 rounded-3xl space-y-4 shadow-sm animate-pulse">
                                        <div className="h-48 bg-slate-100 rounded-2xl w-full"></div>
                                        <div className="h-5 bg-slate-100 rounded-lg w-3/4"></div>
                                        <div className="h-3 bg-slate-100 rounded-lg w-1/2"></div>
                                        <div className="h-10 bg-slate-100 rounded-2xl w-full"></div>
                                    </div>
                                ))
                            ) : (
                                /* Conditional Rendering: Render fetched data list when loading completed */
                                products.map((item) => (
                                    <div key={item.id} className="bg-white rounded-3xl overflow-hidden border border-slate-100 p-6 shadow-sm hover:shadow-md transition-all flex flex-col justify-between group">
                                        <div className="space-y-4">
                                            <div className="h-48 bg-slate-50 rounded-2xl p-4 overflow-hidden flex items-center justify-center relative">
                                                <img src={item.image} className="h-full object-contain group-hover:scale-105 transition-all duration-300" alt={item.title} />
                                                <span className="absolute top-3 left-3 bg-secondary text-primary font-bold text-[8px] uppercase tracking-widest px-2.5 py-1 rounded-full">{item.category}</span>
                                            </div>
                                            
                                            <div className="space-y-2">
                                                <h4 className="font-bold text-sm text-primary line-clamp-1 group-hover:text-secondary transition-colors">{item.title}</h4>
                                                <p className="text-[10px] text-on-surface-variant font-light line-clamp-2 leading-relaxed">{item.description}</p>
                                            </div>
                                        </div>

                                        <div className="pt-6 space-y-3">
                                            <div className="flex justify-between items-center text-xs">
                                                <span className="text-slate-400 font-light">Estimasi Harga</span>
                                                <span className="font-bold text-slate-900 text-sm">{formatRupiah(item.price)}</span>
                                            </div>
                                            <button onClick={() => setSelectedProduct(item)} className="w-full bg-slate-50 hover:bg-primary hover:text-white text-primary text-xs font-bold py-3 rounded-2xl border border-slate-100 transition-all">
                                                Detail Suvenir
                                            </button>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </main>

                    {/* Product Detail Modal (Conditional Rendering) */}
                    {selectedProduct && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-primary/70 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl p-8 max-w-md w-full text-left shadow-2xl animate-fade-in relative space-y-6">
                                <button className="absolute top-4 right-4 p-1.5 hover:bg-slate-100 rounded-full flex items-center" onClick={() => setSelectedProduct(null)}>
                                    <span className="material-symbols-outlined">close</span>
                                </button>

                                <div className="h-56 bg-slate-50 rounded-2xl p-4 flex items-center justify-center">
                                    <img src={selectedProduct.image} className="h-full object-contain" alt={selectedProduct.title} />
                                </div>

                                <div className="space-y-2">
                                    <span className="text-secondary font-bold text-[9px] uppercase tracking-widest">{selectedProduct.category}</span>
                                    <h3 className="font-bold text-lg text-primary leading-tight font-serif">{selectedProduct.title}</h3>
                                    <p className="font-bold text-sm text-secondary">{formatRupiah(selectedProduct.price)}</p>
                                </div>

                                <div className="space-y-1">
                                    <h4 className="font-bold text-[9px] uppercase tracking-widest text-slate-400">Deskripsi Lengkap</h4>
                                    <p className="text-[11px] text-slate-500 leading-relaxed font-light">{selectedProduct.description}</p>
                                </div>

                                <button onClick={() => setSelectedProduct(null)} className="w-full bg-primary hover:bg-secondary text-white hover:text-primary py-3 rounded-xl font-bold text-xs uppercase tracking-wider transition-colors shadow-md">
                                    Tutup Detail
                                </button>
                            </div>
                        </div>
                    )}

                    <footer className="bg-primary text-white border-t border-slate-900 mt-24">
                        <div className="border-t border-slate-900 py-6 text-center text-[10px] text-slate-500 font-light">
                            &copy; 2026 RIT Hotel Hotel Yogyakarta. Seluruh Hak Cipta Dilindungi. Tugas UTS Pemrograman Web - Kelompok 4.
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
