<!DOCTYPE html>
<html class="scroll-smooth" lang="id">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>RIT Hotel Console | Panel Utama Administrasi</title>
    <!-- Tailwind CSS with Forms plugin -->
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <!-- Google Fonts Poppins & Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="css/polish.css" rel="stylesheet">
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel CDN for JSX processing in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#000613",
                        secondary: "#D4AF37",
                        "secondary-dark": "#AA7C11",
                        surface: "#F9FAFC",
                        "on-surface-variant": "#64748B"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const initialKamar = [
            { id: 1, name: "Superior King Garden", type: "Superior", price: 2150000, status: "Tersedia" },
            { id: 2, name: "Deluxe Malioboro View", type: "Deluxe", price: 3450000, status: "Tersedia" },
            { id: 3, name: "Presidential Sky Suite", type: "Suite", price: 8900000, status: "Penuh" }
        ];

        const initialPromos = [
            { id: 1, code: "VISTASUMMER", title: "Promo Musim Panas", discount_percentage: 15, valid_until: "2026-08-31" },
            { id: 2, code: "HONEYMOON", title: "Romantis Bulan Madu", discount_percentage: 20, valid_until: "2026-12-31" }
        ];

        const initialNews = [
            { id: 1, title: "Grand Opening Restoran Vista Delicacy", author: "Chef Alexander", created_at: "2026-05-20" },
            { id: 2, title: "Penghargaan Hotel Mewah Terbaik 2026", author: "General Manager", created_at: "2026-04-15" }
        ];

        const initialGallery = [
            { id: 1, title: "Lobi Utama Emas", category: "hotel", image: "https://lh3.googleusercontent.com/aida-public/AB6AXuBQACVwNZCekfa5-vD8vkXmucjT7o3ZQayjO67s6K1F3pXcqA_lExy8eBps-81m41QCysLxtMdLS14MQQKPtJs_jnQPCSeFa-mNFEmW7VxVsl0RNLv1miTKkya-2NKGpMpK_zC532kIunE8ui_Dc0UrFKEuKUcMRiLjdArUiCaHZL-DWy10WxeB2I-pRKBczr_a1pU8eXbWjiUXqhSldLkpKSuYvw5G6NYMtQYUoSvRFUk0A-wUkCAVJJIr8JVTuJarSN2FgojRDNvq" },
            { id: 2, category: "kamar", title: "Royal Penthouse Suite", image: "https://lh3.googleusercontent.com/aida-public/AB6AXuCDK995g7Z23U4Y_eoDstNflhqYvSDYCHLwBCc417c2AhtrajR5kpp5uZ_NDx1WA-HHzDjupql_WI4wzYHOO-jtSpxtu6K1vEQUhacFVmpH4d60-xdQJRiZuinARAyQguhS_NUOhgpW2EsDchczqiC8jLqA3tADdpt4rpiP-c-RV_PCNkudyR-9uUZmOjIN1gUCiIE22bAjZEqig5HfmbxXbbYySYdI8g7DHgK_UOxRolOuhvc5_7zK1sLKHKaH7dV_fuRzI81Xidf4" }
        ];

        function App() {
            // View tabs toggles using React state (Hermon dashboard conditional view state requirement)
            const [currentView, setCurrentView] = useState("dashboard"); // dashboard, kamar, promo, news, gallery
            
            // Local Database state variables
            const [kamar, setKamar] = useState([]);
            const [promos, setPromos] = useState([]);
            const [news, setNews] = useState([]);
            const [gallery, setGallery] = useState([]);

            // Form inputs states
            const [newRoomName, setNewRoomName] = useState("");
            const [newRoomType, setNewRoomType] = useState("Superior");
            const [newRoomPrice, setNewRoomPrice] = useState("");
            const [newRoomDetail, setNewRoomDetail] = useState("");
            const [newRoomImage, setNewRoomImage] = useState("");
            const [newRoomPreview, setNewRoomPreview] = useState(null);
            
            const [newPromoCode, setNewPromoCode] = useState("");
            const [newPromoTitle, setNewPromoTitle] = useState("");
            const [newPromoDiscount, setNewPromoDiscount] = useState("");
            const [newPromoValid, setNewPromoValid] = useState("");
            const [newPromoDesc, setNewPromoDesc] = useState("");
            const [newPromoImage, setNewPromoImage] = useState("");
            const [newPromoPreview, setNewPromoPreview] = useState(null);

            const [newNewsTitle, setNewNewsTitle] = useState("");
            const [newNewsAuthor, setNewNewsAuthor] = useState("Admin");
            const [newNewsContent, setNewNewsContent] = useState("");
            const [newNewsImage, setNewNewsImage] = useState("");
            const [newNewsPreview, setNewNewsPreview] = useState(null);

            const [newGalTitle, setNewGalTitle] = useState("");
            const [newGalCategory, setNewGalCategory] = useState("hotel");
            const [newGalImage, setNewGalImage] = useState("");
            const [newGalPreview, setNewGalPreview] = useState(null);
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [bookings, setBookings] = useState([]);
            const [totalUsers, setTotalUsers] = useState(24);

            const [alertMsg, setAlertMsg] = useState("");

            const sampleBookings = [
                { id: 1, guest_name: "Budi Santoso", room_name: "Superior King Garden", check_in: "2026-05-28", check_out: "2026-05-30", total_price: 4870000, status: "Confirmed" },
                { id: 2, guest_name: "Siti Rahayu", room_name: "Deluxe Malioboro View", check_in: "2026-06-01", check_out: "2026-06-03", total_price: 7745000, status: "Pending" },
                { id: 3, guest_name: "John Doe", room_name: "Presidential Sky Suite", check_in: "2026-06-10", check_out: "2026-06-12", total_price: 19550000, status: "Confirmed" },
                { id: 4, guest_name: "Andi Wijaya", room_name: "RIT Hotel Royal Suite", check_in: "2026-06-15", check_out: "2026-06-18", total_price: 38550000, status: "Pending" }
            ];

            useEffect(() => {
                // Initialize database structures
                const storedKamar = localStorage.getItem("kamar_db") || JSON.stringify(initialKamar);
                const storedPromos = localStorage.getItem("promos_db") || JSON.stringify(initialPromos);
                const storedNews = localStorage.getItem("berita_db") || JSON.stringify(initialNews);
                const storedGal = localStorage.getItem("galeri_db") || JSON.stringify(initialGallery);

                localStorage.setItem("kamar_db", storedKamar);
                localStorage.setItem("promos_db", storedPromos);
                localStorage.setItem("berita_db", storedNews);
                localStorage.setItem("galeri_db", storedGal);

                setKamar(JSON.parse(storedKamar));
                setPromos(JSON.parse(storedPromos));
                setNews(JSON.parse(storedNews));
                setGallery(JSON.parse(storedGal));

                let storedBookings = JSON.parse(localStorage.getItem("bookings_db") || "[]");
                if (storedBookings.length === 0) {
                    localStorage.setItem("bookings_db", JSON.stringify(sampleBookings));
                    storedBookings = sampleBookings;
                }
                setBookings(storedBookings);
                setTotalUsers(Number(localStorage.getItem("users_count") || "24"));
            }, []);

            const totalRevenue = bookings.reduce((sum, b) => sum + (b.total_price || 0), 0);
            const monthlyChart = [
                { month: "Jan", value: 42 },
                { month: "Feb", value: 55 },
                { month: "Mar", value: 48 },
                { month: "Apr", value: 62 },
                { month: "Mei", value: 78 },
                { month: "Jun", value: 85 }
            ];

            const formatRupiah = (val) => {
                return 'Rp ' + new Intl.NumberFormat('id-ID').format(val);
            };

            const triggerAlert = (msg) => {
                setAlertMsg(msg);
                setTimeout(() => setAlertMsg(""), 3000);
            };

            // CRUD handlers for rooms
            const handleRoomFile = (file) => {
                if (!file || !file.type.startsWith('image/')) return;
                setNewRoomImage(file.name);
                const reader = new FileReader();
                reader.onloadend = () => setNewRoomPreview(reader.result);
                reader.readAsDataURL(file);
            };

            const addRoom = (e) => {
                e.preventDefault();
                const newR = {
                    id: kamar.length + 1,
                    name: newRoomName,
                    type: newRoomType,
                    price: Number(newRoomPrice),
                    detail: newRoomDetail || "Pemandangan Menawan • King Bed • Luas 35m²",
                    image: newRoomPreview || "https://images.unsplash.com/photo-1618773928121-c32242e63f39?auto=format&fit=crop&q=80&w=800",
                    amenities: "wifi,local_bar,tv",
                    status: "Tersedia"
                };
                const updated = [...kamar, newR];
                setKamar(updated);
                localStorage.setItem("kamar_db", JSON.stringify(updated));
                localStorage.setItem("kamar_version", "2");
                
                setNewRoomName("");
                setNewRoomPrice("");
                setNewRoomDetail("");
                setNewRoomImage("");
                setNewRoomPreview(null);
                triggerAlert("Kamar baru berhasil ditambahkan secara lokal!");
            };

            const deleteRoom = (id) => {
                const updated = kamar.filter(r => r.id !== id);
                setKamar(updated);
                localStorage.setItem("kamar_db", JSON.stringify(updated));
                localStorage.setItem("kamar_version", "2");
                triggerAlert("Kamar berhasil dihapus secara lokal!");
            };

            // CRUD handlers for promos
            const handlePromoFile = (file) => {
                if (!file || !file.type.startsWith('image/')) return;
                setNewPromoImage(file.name);
                const reader = new FileReader();
                reader.onloadend = () => setNewPromoPreview(reader.result);
                reader.readAsDataURL(file);
            };

            const addPromo = (e) => {
                e.preventDefault();
                const newP = {
                    id: promos.length + 1,
                    code: newPromoCode.toUpperCase(),
                    title: newPromoTitle,
                    discount_percentage: Number(newPromoDiscount),
                    description: newPromoDesc || "Diskon spesial eksklusif RIT Hotel Yogyakarta.",
                    valid_until: newPromoValid,
                    image: newPromoPreview || "https://images.unsplash.com/photo-1571896349842-33c89424de2d?auto=format&fit=crop&q=80&w=600"
                };
                const updated = [...promos, newP];
                setPromos(updated);
                localStorage.setItem("promos_db", JSON.stringify(updated));

                setNewPromoCode("");
                setNewPromoTitle("");
                setNewPromoDiscount("");
                setNewPromoValid("");
                setNewPromoDesc("");
                setNewPromoImage("");
                setNewPromoPreview(null);
                triggerAlert("Promo baru berhasil ditambahkan secara lokal!");
            };

            const deletePromo = (id) => {
                const updated = promos.filter(p => p.id !== id);
                setPromos(updated);
                localStorage.setItem("promos_db", JSON.stringify(updated));
                triggerAlert("Promo berhasil dihapus secara lokal!");
            };

            // CRUD handlers for News/Berita
            const handleNewsFile = (file) => {
                if (!file || !file.type.startsWith('image/')) return;
                setNewNewsImage(file.name);
                const reader = new FileReader();
                reader.onloadend = () => setNewNewsPreview(reader.result);
                reader.readAsDataURL(file);
            };

            const addNews = (e) => {
                e.preventDefault();
                const newN = {
                    id: news.length + 1,
                    title: newNewsTitle,
                    author: newNewsAuthor,
                    content: newNewsContent || "Konten artikel berita utama dari RIT Hotel.",
                    image: newNewsPreview || "https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&q=80&w=800",
                    created_at: new Date().toISOString()
                };
                const updated = [...news, newN];
                setNews(updated);
                localStorage.setItem("berita_db", JSON.stringify(updated));

                setNewNewsTitle("");
                setNewNewsContent("");
                setNewNewsImage("");
                setNewNewsPreview(null);
                triggerAlert("Berita baru berhasil ditambahkan secara lokal!");
            };

            const deleteNews = (id) => {
                const updated = news.filter(n => n.id !== id);
                setNews(updated);
                localStorage.setItem("berita_db", JSON.stringify(updated));
                triggerAlert("Berita berhasil dihapus secara lokal!");
            };

            // CRUD handlers for Gallery
            const handleGalFile = (file) => {
                if (!file || !file.type.startsWith('image/')) return;
                setNewGalImage(file.name);
                const reader = new FileReader();
                reader.onloadend = () => setNewGalPreview(reader.result);
                reader.readAsDataURL(file);
            };

            const addGallery = (e) => {
                e.preventDefault();
                const newG = {
                    id: gallery.length + 1,
                    title: newGalTitle,
                    category: newGalCategory,
                    description: "Foto unggahan admin — RIT Hotel Yogyakarta.",
                    image: newGalPreview || "https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&q=80&w=600"
                };
                const updated = [...gallery, newG];
                setGallery(updated);
                localStorage.setItem("galeri_db", JSON.stringify(updated));
                localStorage.setItem("galeri_version", "2");

                setNewGalTitle("");
                setNewGalImage("");
                setNewGalPreview(null);
                triggerAlert("Foto galeri baru berhasil ditambahkan!");
            };

            const deleteGallery = (id) => {
                const updated = gallery.filter(g => g.id !== id);
                setGallery(updated);
                localStorage.setItem("galeri_db", JSON.stringify(updated));
                triggerAlert("Foto galeri berhasil dihapus!");
            };

            return (
                <div className="flex-grow flex min-h-screen relative">
                    {sidebarOpen && <div className="fixed inset-0 bg-black/50 z-40 lg:hidden" onClick={() => setSidebarOpen(false)}></div>}
                    {/* Left Sidebar Menu */}
                    <aside className={`fixed lg:static inset-y-0 left-0 z-50 w-64 bg-slate-900 text-slate-300 shrink-0 flex flex-col justify-between py-8 px-6 shadow-xl transform transition-transform duration-300 ${sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
                        <div className="space-y-8">
                            <h1 className="text-xl font-bold font-serif text-white tracking-wider flex items-center gap-2">
                                <span className="text-[#D4AF37]">RIT</span>Hotel Admin
                            </h1>
                            <div className="flex items-center gap-3 py-4 border-y border-slate-800">
                                <div className="w-10 h-10 rounded-full bg-[#D4AF37] text-primary flex items-center justify-center font-bold">A</div>
                                <div>
                                    <h4 className="font-bold text-xs text-white leading-tight">Alexander Vance</h4>
                                    <p className="text-[9px] uppercase tracking-wider text-[#D4AF37] font-bold mt-1">Estate Manager</p>
                                </div>
                            </div>
                            
                            {/* React view controls mapping */}
                            <nav className="flex flex-col gap-1.5 text-xs font-bold uppercase tracking-wider">
                                <button onClick={() => { setCurrentView("dashboard"); setSidebarOpen(false); }} className={`flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-left ${currentView === 'dashboard' ? 'bg-slate-800 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                                    <span className="material-symbols-outlined text-sm">dashboard</span> Dasbor Utama
                                </button>
                                <button onClick={() => { setCurrentView("kamar"); setSidebarOpen(false); }} className={`flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-left ${currentView === 'kamar' ? 'bg-slate-800 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                                    <span className="material-symbols-outlined text-sm">hotel</span> Kelola Kamar
                                </button>
                                <button onClick={() => { setCurrentView("promo"); setSidebarOpen(false); }} className={`flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-left ${currentView === 'promo' ? 'bg-slate-800 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                                    <span className="material-symbols-outlined text-sm">sell</span> Kelola Promo
                                </button>
                                <button onClick={() => { setCurrentView("news"); setSidebarOpen(false); }} className={`flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-left ${currentView === 'news' ? 'bg-slate-800 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                                    <span className="material-symbols-outlined text-sm">article</span> Kelola News
                                </button>
                                <button onClick={() => { setCurrentView("gallery"); setSidebarOpen(false); }} className={`flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-left ${currentView === 'gallery' ? 'bg-slate-800 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                                    <span className="material-symbols-outlined text-sm">gallery_thumbnail</span> Kelola Gallery
                                </button>
                            </nav>
                        </div>
                        <a href="index.html" className="flex items-center gap-3 text-red-400 hover:text-red-500 font-bold text-xs uppercase tracking-wider border-t border-slate-800 pt-6">
                            <span className="material-symbols-outlined text-sm">logout</span> Keluar Portal
                        </a>
                    </aside>

                    {/* Main administration panel area */}
                    <main className="flex-grow p-6 md:p-10 space-y-8 max-w-7xl mx-auto w-full lg:ml-0">
                        <header className="flex flex-wrap justify-between items-center gap-4 pb-6 border-b border-slate-200">
                            <div className="flex items-center gap-3">
                                <button className="lg:hidden p-2 rounded-xl bg-slate-100" onClick={() => setSidebarOpen(true)}>
                                    <span className="material-symbols-outlined">menu</span>
                                </button>
                                <div>
                                <h2 className="text-lg md:text-xl font-bold font-serif text-slate-900 uppercase tracking-wide">RIT Hotel ESTATE MANAGEMENT</h2>
                                <p className="text-xs text-slate-400 mt-1">Panel Admin Yogyakarta — Simulasi React & localStorage</p>
                                </div>
                            </div>
                            <a href="index.html" target="_blank" className="bg-slate-200 hover:bg-slate-300 text-slate-700 px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider transition-all flex items-center gap-1.5">
                                <span className="material-symbols-outlined text-sm">open_in_new</span>
                                Buka Website Utama
                            </a>
                        </header>

                        {/* Local alert prompts */}
                        {alertMsg && (
                            <div className="bg-emerald-50 text-emerald-800 p-4 border-l-4 border-emerald-500 rounded-xl text-xs font-bold uppercase tracking-wider animate-bounce">
                                {alertMsg}
                            </div>
                        )}

                        {/* Rendering dynamic administration content based on current active view tab */}
                        {currentView === "dashboard" && (
                            <div className="space-y-8">
                                <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4 md:gap-6">
                                    <div className="bg-white p-5 md:p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4 card-premium">
                                        <div className="p-3 rounded-xl bg-blue-50 text-blue-600"><span className="material-symbols-outlined text-2xl">book_online</span></div>
                                        <div>
                                            <p className="text-slate-400 text-[10px] font-bold uppercase tracking-wider">Total Booking</p>
                                            <h4 className="font-bold text-xl text-primary">{bookings.length}</h4>
                                        </div>
                                    </div>
                                    <div className="bg-white p-5 md:p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4 card-premium">
                                        <div className="p-3 rounded-xl bg-emerald-50 text-emerald-600"><span className="material-symbols-outlined text-2xl">group</span></div>
                                        <div>
                                            <p className="text-slate-400 text-[10px] font-bold uppercase tracking-wider">Total User</p>
                                            <h4 className="font-bold text-xl text-primary">{totalUsers}</h4>
                                        </div>
                                    </div>
                                    <div className="bg-white p-5 md:p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4 card-premium">
                                        <div className="p-3 rounded-xl bg-amber-50 text-secondary"><span className="material-symbols-outlined text-2xl">king_bed</span></div>
                                        <div>
                                            <p className="text-slate-400 text-[10px] font-bold uppercase tracking-wider">Kamar Terdaftar</p>
                                            <h4 className="font-bold text-xl text-primary">{kamar.length}</h4>
                                        </div>
                                    </div>
                                    <div className="bg-white p-5 md:p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4 card-premium">
                                        <div className="p-3 rounded-xl bg-purple-50 text-purple-600"><span className="material-symbols-outlined text-2xl">payments</span></div>
                                        <div>
                                            <p className="text-slate-400 text-[10px] font-bold uppercase tracking-wider">Pendapatan (Dummy)</p>
                                            <h4 className="font-bold text-lg text-primary">{formatRupiah(totalRevenue)}</h4>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    <div className="lg:col-span-2 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                        <h3 className="font-bold text-sm uppercase tracking-wider text-primary border-b pb-3 mb-4">Statistik Pendapatan Bulanan (Dummy)</h3>
                                        <div className="flex items-end justify-between gap-2 h-40">
                                            {monthlyChart.map((m) => (
                                                <div key={m.month} className="flex-1 flex flex-col items-center gap-2">
                                                    <div className="w-full bg-slate-100 rounded-t-lg flex items-end h-32">
                                                        <div className="w-full bg-secondary rounded-t-lg chart-bar" style={{ height: `${m.value}%` }}></div>
                                                    </div>
                                                    <span className="text-[9px] font-bold text-slate-500">{m.month}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="bg-[#000613] text-white p-6 rounded-2xl space-y-3">
                                        <span className="text-[#D4AF37] text-[10px] font-bold uppercase tracking-widest">Ringkasan Cepat</span>
                                        <p className="text-xs text-slate-300 font-light leading-relaxed">Promo aktif: <strong className="text-white">{promos.length}</strong> · Berita: <strong className="text-white">{news.length}</strong> · Galeri: <strong className="text-white">{gallery.length}</strong></p>
                                        <div className="flex flex-wrap gap-2 pt-2">
                                            <button onClick={() => setCurrentView("kamar")} className="text-[10px] bg-white/10 hover:bg-secondary hover:text-primary px-3 py-2 rounded-lg font-bold uppercase transition-all">+ Kamar</button>
                                            <button onClick={() => setCurrentView("promo")} className="text-[10px] bg-white/10 hover:bg-secondary hover:text-primary px-3 py-2 rounded-lg font-bold uppercase transition-all">+ Promo</button>
                                            <button onClick={() => setCurrentView("gallery")} className="text-[10px] bg-white/10 hover:bg-secondary hover:text-primary px-3 py-2 rounded-lg font-bold uppercase transition-all">+ Galeri</button>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm overflow-x-auto">
                                    <h3 className="font-bold text-sm uppercase tracking-wider text-primary border-b pb-3 mb-4">Booking Terbaru</h3>
                                    <table className="w-full text-xs text-left min-w-[600px]">
                                        <thead>
                                            <tr className="bg-slate-50 text-slate-500 font-bold uppercase tracking-wider">
                                                <th className="py-2.5 px-3">Tamu</th>
                                                <th className="py-2.5 px-3">Kamar</th>
                                                <th className="py-2.5 px-3">Tanggal</th>
                                                <th className="py-2.5 px-3 text-right">Total</th>
                                                <th className="py-2.5 px-3 text-center">Status</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {bookings.slice(0, 5).map(b => (
                                                <tr key={b.id} className="border-b border-slate-50 hover:bg-slate-50/50">
                                                    <td className="py-3 px-3 font-semibold">{b.guest_name}</td>
                                                    <td className="py-3 px-3">{b.room_name}</td>
                                                    <td className="py-3 px-3 text-slate-500">{b.check_in} — {b.check_out}</td>
                                                    <td className="py-3 px-3 text-right font-bold">
                                                        {formatRupiah(b.total_price)}
                                                        {b.promo_code && (
                                                            <div className="text-[9px] text-emerald-600 font-bold mt-0.5">
                                                                Kupon: {b.promo_code} (-{formatRupiah(b.discount_amount)})
                                                            </div>
                                                        )}
                                                    </td>
                                                    <td className="py-3 px-3 text-center">
                                                        <span className={`px-2 py-1 rounded-full text-[9px] font-bold ${b.status === 'Confirmed' ? 'bg-emerald-50 text-emerald-700' : 'bg-amber-50 text-amber-700'}`}>{b.status}</span>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>

                                <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm overflow-x-auto">
                                    <h3 className="font-bold text-sm uppercase tracking-wider text-primary border-b pb-3 mb-4">Data Kamar Hotel</h3>
                                    <table className="w-full text-xs text-left min-w-[500px]">
                                        <thead>
                                            <tr className="bg-slate-50 text-slate-500 font-bold uppercase tracking-wider">
                                                <th className="py-2.5 px-3">Nama</th>
                                                <th className="py-2.5 px-3">Tipe</th>
                                                <th className="py-2.5 px-3 text-right">Harga</th>
                                                <th className="py-2.5 px-3 text-center">Status</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {kamar.map(r => (
                                                <tr key={r.id} className="border-b border-slate-50">
                                                    <td className="py-3 px-3 font-bold">{r.name}</td>
                                                    <td className="py-3 px-3 text-secondary font-semibold uppercase">{r.type}</td>
                                                    <td className="py-3 px-3 text-right font-bold">{formatRupiah(r.price)}</td>
                                                    <td className="py-3 px-3 text-center">
                                                        <span className={`text-[9px] font-bold px-2 py-1 rounded-full ${r.status === 'Tersedia' ? 'bg-emerald-50 text-emerald-700' : 'bg-red-50 text-red-700'}`}>{r.status || 'Tersedia'}</span>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* Kamar CRUD */}
                        {currentView === "kamar" && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
                                <div className="lg:col-span-2 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-4">
                                    <h3 className="font-bold text-sm uppercase tracking-wider text-primary border-b pb-3">Daftar Kamar</h3>
                                    <table className="w-full text-xs text-left">
                                        <thead>
                                            <tr className="bg-slate-50 border-y border-slate-100 text-slate-500 font-bold uppercase tracking-wider">
                                                <th className="py-2.5 px-3">Pratinjau</th>
                                                <th className="py-2.5 px-3">Nama Kamar</th>
                                                <th className="py-2.5 px-3">Tipe</th>
                                                <th className="py-2.5 px-3 text-right">Tarif / Malam</th>
                                                <th className="py-2.5 px-3 text-center">Aksi</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {kamar.map(r => (
                                                <tr key={r.id} className="border-b border-slate-50 hover:bg-slate-50/50">
                                                    <td className="py-3 px-3">
                                                        <img src={r.image || 'https://images.unsplash.com/photo-1618773928121-c32242e63f39?auto=format&fit=crop&q=80&w=800'} className="w-12 h-8 rounded object-cover border border-slate-200" />
                                                    </td>
                                                    <td className="py-3 px-3 font-bold text-slate-900">
                                                        <div>{r.name}</div>
                                                        <div className="text-[10px] text-slate-400 font-light">{r.detail}</div>
                                                    </td>
                                                    <td className="py-3 px-3 uppercase text-secondary font-semibold">{r.type}</td>
                                                    <td className="py-3 px-3 text-right font-bold">{formatRupiah(r.price)}</td>
                                                    <td className="py-3 px-3 text-center">
                                                        <button onClick={() => deleteRoom(r.id)} className="text-red-500 hover:text-red-700 font-bold flex items-center justify-center gap-1 mx-auto">
                                                            <span className="material-symbols-outlined text-xs">delete</span> Hapus
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>

                                <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-4">
                                    <h3 className="font-bold text-sm uppercase tracking-wider text-[#D4AF37] border-b pb-3">Tambah Kamar Baru</h3>
                                    <form onSubmit={addRoom} className="space-y-4 text-xs">
                                        <div className="flex flex-col gap-1">
                                            <label className="font-bold text-slate-500">Nama Kamar</label>
                                            <input type="text" value={newRoomName} onChange={(e) => setNewRoomName(e.target.value)} className="bg-slate-50 border-slate-200 rounded-xl px-3 py-2 outline-none font-semibold" placeholder="Executive Suite" required />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="font-bold text-slate-500">Tipe Kamar</label>
                                            <select value={newRoomType} onChange={(e) => setNewRoomType(e.target.value)} className="bg-slate-50 border-slate-200 rounded-xl px-3 py-2 outline-none font-semibold">
                                                <option value="Superior">Superior</option>
                                                <option value="Deluxe">Deluxe</option>
                                                <option value="Suite">Suite</option>
                                            </select>
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="font-bold text-slate-500">Harga per Malam (IDR)</label>
                                            <input type="number" value={newRoomPrice} onChange={(e) => setNewRoomPrice(e.target.value)} className="bg-slate-50 border-slate-200 rounded-xl px-3 py-2 outline-none font-semibold" placeholder="2500000" required />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="font-bold text-slate-500">Detail Kamar</label>
                                            <input type="text" value={newRoomDetail} onChange={(e) => setNewRoomDetail(e.target.value)} className="bg-slate-50 border-slate-200 rounded-xl px-3 py-2 outline-none font-semibold" placeholder="Contoh: Pemandangan Taman • King Bed • Luas 32m²" required />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="font-bold text-slate-500">Unggah Foto Kamar</label>
                                            <div className="upload-zone rounded-xl p-4 text-center cursor-pointer bg-slate-50 border border-dashed border-slate-200 hover:bg-slate-100 transition-colors" onClick={() => document.getElementById('admin-room-file').click()}>
                                                <input id="admin-room-file" type="file" accept="image/*" className="hidden" onChange={(e) => handleRoomFile(e.target.files[0])} />
                                                {newRoomPreview ? (
                                                    <img src={newRoomPreview} className="max-h-28 mx-auto rounded-lg object-cover" alt="Preview" />
                                                ) : (
                                                    <p className="text-[10px] text-slate-400">Klik untuk pilih foto kamar (simulasi)</p>
                                                )}
                                            </div>
                                        </div>
                                        <button type="submit" className="w-full bg-primary hover:bg-[#D4AF37] text-white hover:text-primary transition-all py-3 rounded-xl font-bold uppercase">Tambah Kamar</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* Promo CRUD */}
                        {currentView === "promo" && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
                                <div className="lg:col-span-2 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-4">
                                    <h3 className="font-bold text-sm uppercase tracking-wider text-primary border-b pb-3">Daftar Promo & Diskon</h3>
                                    <table className="w-full text-xs text-left">
                                        <thead>
                                            <tr className="bg-slate-50 border-y border-slate-100 text-slate-500 font-bold uppercase tracking-wider">
                                                <th className="py-2.5 px-3">Pratinjau</th>
                                                <th className="py-2.5 px-3">Kode Kupon</th>
                                                <th className="py-2.5 px-3">Nama Promo</th>
                                                <th className="py-2.5 px-3 text-center">Diskon</th>
                                                <th className="py-2.5 px-3 text-center">Aksi</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {promos.map(p => (
                                                <tr key={p.id} className="border-b border-slate-50">
                                                    <td className="py-3 px-3">
                                                        <img src={p.image || 'https://images.unsplash.com/photo-1571896349842-33c89424de2d?auto=format&fit=crop&q=80&w=600'} className="w-12 h-8 rounded object-cover border border-slate-200" />
                                                    </td>
                                                    <td className="py-3 px-3 font-mono font-bold text-secondary">{p.code}</td>
                                                    <td className="py-3 px-3">
                                                        <div className="font-semibold text-slate-900">{p.title}</div>
                                                        <div className="text-[10px] text-slate-400 font-light max-w-xs truncate">{p.description}</div>
                                                    </td>
                                                    <td className="py-3 px-3 text-center font-bold text-emerald-600">{p.discount_percentage}%</td>
                                                    <td className="py-3 px-3 text-center">
                                                        <button onClick={() => deletePromo(p.id)} className="text-red-500 hover:text-red-700 font-bold flex items-center justify-center gap-1 mx-auto">
                                                            <span className="material-symbols-outlined text-xs">delete</span> Hapus
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>

                                <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-4">
                                    <h3 className="font-bold text-sm uppercase tracking-wider text-[#D4AF37] border-b pb-3">Tambah Kupon Promo</h3>
                                    <form onSubmit={addPromo} className="space-y-4 text-xs">
                                        <div className="flex flex-col gap-1">
                                            <label className="font-bold text-slate-500">Kode Kupon</label>
                                            <input type="text" value={newPromoCode} onChange={(e) => setNewPromoCode(e.target.value)} className="bg-slate-50 border-slate-200 rounded-xl px-3 py-2 outline-none font-semibold" placeholder="VISTAWEEKEND" required />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="font-bold text-slate-500">Nama Promo</label>
                                            <input type="text" value={newPromoTitle} onChange={(e) => setNewPromoTitle(e.target.value)} className="bg-slate-50 border-slate-200 rounded-xl px-3 py-2 outline-none font-semibold" placeholder="Diskon Akhir Pekan" required />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="font-bold text-slate-500">Deskripsi Promo</label>
                                            <textarea value={newPromoDesc} onChange={(e) => setNewPromoDesc(e.target.value)} rows="2" className="bg-slate-50 border-slate-200 rounded-xl px-3 py-2 outline-none" placeholder="Tulis deskripsi promo..." required></textarea>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div className="flex flex-col gap-1">
                                                <label className="font-bold text-slate-500">Diskon (%)</label>
                                                <input type="number" min="1" max="100" value={newPromoDiscount} onChange={(e) => setNewPromoDiscount(e.target.value)} className="bg-slate-50 border-slate-200 rounded-xl px-3 py-2 outline-none font-semibold" placeholder="10" required />
                                            </div>
                                            <div className="flex flex-col gap-1">
                                                <label className="font-bold text-slate-500">Berlaku Sampai</label>
                                                <input type="date" value={newPromoValid} onChange={(e) => setNewPromoValid(e.target.value)} className="bg-slate-50 border-slate-200 rounded-xl px-3 py-2 outline-none font-semibold" required />
                                            </div>
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="font-bold text-slate-500">Unggah Foto Promo</label>
                                            <div className="upload-zone rounded-xl p-4 text-center cursor-pointer bg-slate-50 border border-dashed border-slate-200 hover:bg-slate-100 transition-colors" onClick={() => document.getElementById('admin-promo-file').click()}>
                                                <input id="admin-promo-file" type="file" accept="image/*" className="hidden" onChange={(e) => handlePromoFile(e.target.files[0])} />
                                                {newPromoPreview ? (
                                                    <img src={newPromoPreview} className="max-h-28 mx-auto rounded-lg object-cover" alt="Preview" />
                                                ) : (
                                                    <p className="text-[10px] text-slate-400">Klik untuk pilih foto promo (simulasi)</p>
                                                )}
                                            </div>
                                        </div>
                                        <button type="submit" className="w-full bg-primary hover:bg-[#D4AF37] text-white hover:text-primary transition-all py-3 rounded-xl font-bold uppercase">Tambah Kupon</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* News CRUD */}
                        {currentView === "news" && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
                                <div className="lg:col-span-2 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-4">
                                    <h3 className="font-bold text-sm uppercase tracking-wider text-primary border-b pb-3">Daftar Jurnal Berita</h3>
                                    <table className="w-full text-xs text-left">
                                        <thead>
                                            <tr className="bg-slate-50 border-y border-slate-100 text-slate-500 font-bold uppercase tracking-wider">
                                                <th className="py-2.5 px-3">Pratinjau</th>
                                                <th className="py-2.5 px-3">Judul Berita</th>
                                                <th className="py-2.5 px-3">Penulis</th>
                                                <th className="py-2.5 px-3 text-center">Tanggal</th>
                                                <th className="py-2.5 px-3 text-center">Aksi</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {news.map(n => (
                                                <tr key={n.id} className="border-b border-slate-50">
                                                    <td className="py-3 px-3">
                                                        <img src={n.image || 'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&q=80&w=800'} className="w-12 h-8 rounded object-cover border border-slate-200" />
                                                    </td>
                                                    <td className="py-3 px-3 font-bold text-slate-900">
                                                        <div>{n.title}</div>
                                                        <div className="text-[10px] text-slate-400 font-light max-w-xs truncate">{n.content}</div>
                                                    </td>
                                                    <td className="py-3 px-3 text-slate-500 font-medium">{n.author}</td>
                                                    <td className="py-3 px-3 text-center text-slate-400">{new Date(n.created_at).toLocaleDateString('id-ID', {day: 'numeric', month: 'short'})}</td>
                                                    <td className="py-3 px-3 text-center">
                                                        <button onClick={() => deleteNews(n.id)} className="text-red-500 hover:text-red-700 font-bold flex items-center justify-center gap-1 mx-auto">
                                                            <span className="material-symbols-outlined text-xs">delete</span> Hapus
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>

                                <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-4">
                                    <h3 className="font-bold text-sm uppercase tracking-wider text-[#D4AF37] border-b pb-3">Terbitkan Berita Baru</h3>
                                    <form onSubmit={addNews} className="space-y-4 text-xs">
                                        <div className="flex flex-col gap-1">
                                            <label className="font-bold text-slate-500">Judul Jurnal</label>
                                            <input type="text" value={newNewsTitle} onChange={(e) => setNewNewsTitle(e.target.value)} className="bg-slate-50 border-slate-200 rounded-xl px-3 py-2 outline-none font-semibold" placeholder="Konser Akustik Kemang" required />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="font-bold text-slate-500">Penulis Artikel</label>
                                            <input type="text" value={newNewsAuthor} onChange={(e) => setNewNewsAuthor(e.target.value)} className="bg-slate-50 border-slate-200 rounded-xl px-3 py-2 outline-none font-semibold" required />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="font-bold text-slate-500">Isi Berita</label>
                                            <textarea value={newNewsContent} onChange={(e) => setNewNewsContent(e.target.value)} rows="4" className="bg-slate-50 border-slate-200 rounded-xl px-3 py-2 outline-none" placeholder="Tuliskan berita lengkap..." required></textarea>
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="font-bold text-slate-500">Unggah Foto Berita</label>
                                            <div className="upload-zone rounded-xl p-4 text-center cursor-pointer bg-slate-50 border border-dashed border-slate-200 hover:bg-slate-100 transition-colors" onClick={() => document.getElementById('admin-news-file').click()}>
                                                <input id="admin-news-file" type="file" accept="image/*" className="hidden" onChange={(e) => handleNewsFile(e.target.files[0])} />
                                                {newNewsPreview ? (
                                                    <img src={newNewsPreview} className="max-h-28 mx-auto rounded-lg object-cover" alt="Preview" />
                                                ) : (
                                                    <p className="text-[10px] text-slate-400">Klik untuk pilih foto berita (simulasi)</p>
                                                )}
                                            </div>
                                        </div>
                                        <button type="submit" className="w-full bg-primary hover:bg-[#D4AF37] text-white hover:text-primary transition-all py-3 rounded-xl font-bold uppercase">Terbitkan Berita</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* Gallery CRUD */}
                        {currentView === "gallery" && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
                                <div className="lg:col-span-2 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-4">
                                    <h3 className="font-bold text-sm uppercase tracking-wider text-primary border-b pb-3">Daftar Foto Galeri</h3>
                                    <table className="w-full text-xs text-left">
                                        <thead>
                                            <tr className="bg-slate-50 border-y border-slate-100 text-slate-500 font-bold uppercase tracking-wider">
                                                <th className="py-2.5 px-3">Pratinjau</th>
                                                <th className="py-2.5 px-3">Judul Foto</th>
                                                <th className="py-2.5 px-3 text-center">Kategori</th>
                                                <th className="py-2.5 px-3 text-center">Aksi</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {gallery.map(g => (
                                                <tr key={g.id} className="border-b border-slate-50">
                                                    <td className="py-3 px-3"><img src={g.image} className="w-12 h-8 rounded object-cover border border-slate-200" /></td>
                                                    <td className="py-3 px-3 font-bold text-slate-900">{g.title}</td>
                                                    <td className="py-3 px-3 text-center uppercase text-slate-500 font-semibold">{g.category}</td>
                                                    <td className="py-3 px-3 text-center">
                                                        <button onClick={() => deleteGallery(g.id)} className="text-red-500 hover:text-red-700 font-bold flex items-center justify-center gap-1 mx-auto">
                                                            <span className="material-symbols-outlined text-xs">delete</span> Hapus
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>

                                <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-4">
                                    <h3 className="font-bold text-sm uppercase tracking-wider text-[#D4AF37] border-b pb-3">Unggah Gambar Galeri</h3>
                                    <form onSubmit={addGallery} className="space-y-4 text-xs">
                                        <div className="flex flex-col gap-1">
                                            <label className="font-bold text-slate-500">Judul Foto</label>
                                            <input type="text" value={newGalTitle} onChange={(e) => setNewGalTitle(e.target.value)} className="bg-slate-50 border-slate-200 rounded-xl px-3 py-2 outline-none font-semibold" placeholder="Infinity Pool Sunset" required />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="font-bold text-slate-500">Kategori</label>
                                            <select value={newGalCategory} onChange={(e) => setNewGalCategory(e.target.value)} className="bg-slate-50 border-slate-200 rounded-xl px-3 py-2 outline-none font-semibold">
                                                <option value="eksterior">Eksterior Hotel</option>
                                                <option value="lobi">Lobi Hotel</option>
                                                <option value="kamar">Kamar Hotel</option>
                                                <option value="restoran">Restoran</option>
                                                <option value="kolam_renang">Kolam Renang</option>
                                                <option value="meeting_room">Meeting Room</option>
                                            </select>
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="font-bold text-slate-500">Unggah Gambar</label>
                                            <div className="upload-zone rounded-xl p-4 text-center cursor-pointer" onClick={() => document.getElementById('admin-gal-file').click()}>
                                                <input id="admin-gal-file" type="file" accept="image/*" className="hidden" onChange={(e) => handleGalFile(e.target.files[0])} />
                                                {newGalPreview ? (
                                                    <img src={newGalPreview} className="max-h-28 mx-auto rounded-lg object-cover" alt="Preview" />
                                                ) : (
                                                    <p className="text-[10px] text-slate-400">Klik untuk pilih gambar (simulasi)</p>
                                                )}
                                            </div>
                                        </div>
                                        <button type="submit" className="w-full bg-primary hover:bg-[#D4AF37] text-white hover:text-primary transition-all py-3 rounded-xl font-bold uppercase">Tambah Foto</button>
                                    </form>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
