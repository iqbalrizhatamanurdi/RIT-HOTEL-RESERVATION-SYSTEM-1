<!DOCTYPE html>
<html class="scroll-smooth" lang="id">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>RIT Hotel Hotel Yogyakarta | Berita Jurnal & Event</title>
    <!-- Tailwind CSS with Forms plugin -->
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <!-- Google Fonts Poppins & Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel CDN for JSX processing in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: 'Poppins', 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#000613",
                        secondary: "#D4AF37",
                        "secondary-dark": "#AA7C11",
                        surface: "#F9FAFC",
                        "on-surface-variant": "#64748B"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const defaultNews = [
            { id: 1, title: "Grand Opening Restoran Vista Delicacy — Menu Gudeg Jogja", author: "Chef Alexander", content: "RIT Hotel Yogyakarta meresmikan restoran Vista Delicacy dengan menu gudeg autentik, ayam bakar kalasan, dan fine dining internasional di jantung kota budaya.", image: "https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&q=80&w=800", created_at: "2026-05-20T08:00:00Z" },
            { id: 2, title: "Paket Wisata Prambanan & Malioboro Eksklusif", author: "General Manager", content: "Tamu hotel kini dapat memesan paket tur ke Candi Prambanan, Keraton Yogyakarta, dan belanja Malioboro dengan antar-jemput dari lobi hotel.", image: "https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&q=80&w=800", created_at: "2026-04-15T08:00:00Z" }
        ];

        function App() {
            const [news, setNews] = useState([]);
            const [selectedNews, setSelectedNews] = useState(null);

            useEffect(() => {
                const storedNews = localStorage.getItem("berita_db");
                if (!storedNews) {
                    localStorage.setItem("berita_db", JSON.stringify(defaultNews));
                    setNews(defaultNews);
                } else {
                    setNews(JSON.parse(storedNews));
                }
            }, []);

            return (
                <div className="flex flex-col min-h-screen">
                    <header className="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 md:px-12 py-4 bg-white/95 backdrop-blur-md border-b border-slate-100 shadow-sm">
                        <a className="text-2xl font-bold tracking-wider text-primary flex items-center gap-2 font-serif" href="index.html">
                            <span className="text-secondary">RIT</span><span> Hotel</span>
                        </a>
                        <nav className="hidden lg:flex items-center gap-8">
                            <a className="font-medium text-sm text-on-surface-variant hover:text-secondary py-1" href="index.html">Beranda</a>
                            <a className="font-medium text-sm text-on-surface-variant hover:text-secondary py-1" href="daftar_kamar.html">Kamar & Suite</a>
                            <a className="font-medium text-sm text-on-surface-variant hover:text-secondary py-1" href="promo.html">Promo</a>
                            <a className="font-semibold text-sm text-secondary border-b-2 border-secondary py-1" href="news.html">Kabar</a>
                            <a className="font-medium text-sm text-on-surface-variant hover:text-secondary py-1" href="gallery.html">Galeri</a>
                            <a className="font-medium text-sm text-on-surface-variant hover:text-secondary py-1" href="kontak.html">Hubungi Kami</a>
                            <a className="font-medium text-sm text-on-surface-variant hover:text-secondary py-1 font-bold px-3 py-1 bg-amber-50 rounded-lg border border-amber-200" href="api_data.html">API Page (Axios)</a>
                        </nav>
                        <a href="booking.html" className="bg-primary text-white hover:bg-secondary hover:text-primary transition-all px-6 py-2.5 rounded-full text-sm font-bold shadow-md">Pesan</a>
                    </header>

                    <main className="flex-grow pt-28 max-w-7xl mx-auto px-6 w-full pb-24 space-y-12">
                        <div className="text-center space-y-3">
                            <span className="text-secondary font-bold text-xs uppercase tracking-widest block">Kabar Jurnal & Acara</span>
                            <h2 className="font-serif text-3xl md:text-5xl font-bold text-primary">Berita Terbaru</h2>
                            <p className="text-xs md:text-sm text-slate-500 font-light max-w-lg mx-auto">
                                Ikuti terus kabar peluncuran fasilitas premium, event musik akustik senja, dan artikel informatif lainnya dari RIT Hotel.
                            </p>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            {news.map((item) => (
                                <div key={item.id} className="bg-white rounded-3xl overflow-hidden border border-slate-100 shadow-sm hover:shadow-md transition-all flex flex-col group justify-between">
                                    <div className="h-64 overflow-hidden relative">
                                        <img src={item.image} className="w-full h-full object-cover group-hover:scale-105 transition-all duration-500" alt={item.title} />
                                    </div>
                                    
                                    <div className="p-6 space-y-4 flex-grow flex flex-col justify-between text-xs">
                                        <div className="space-y-2">
                                            <span className="text-secondary font-bold text-[9px] uppercase tracking-widest">{item.author} • {new Date(item.created_at).toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year: 'numeric'})}</span>
                                            <h3 className="font-bold text-lg text-primary font-serif line-clamp-1">{item.title}</h3>
                                            <p className="text-slate-400 font-light leading-relaxed line-clamp-3">{item.content}</p>
                                        </div>

                                        <button onClick={() => setSelectedNews(item)} className="w-full bg-slate-50 hover:bg-primary hover:text-white text-primary text-xs font-bold py-3 rounded-xl border border-slate-100 transition-all">
                                            Baca Selengkapnya
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* News Reader Modal */}
                    {selectedNews && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-primary/70 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl p-8 max-w-2xl w-full text-left shadow-2xl animate-fade-in relative max-h-[85vh] overflow-y-auto space-y-6">
                                <button className="absolute top-4 right-4 p-1.5 hover:bg-slate-100 rounded-full flex items-center" onClick={() => setSelectedNews(null)}>
                                    <span className="material-symbols-outlined">close</span>
                                </button>

                                <div className="h-64 rounded-2xl overflow-hidden shadow-inner">
                                    <img src={selectedNews.image} className="w-full h-full object-cover" alt={selectedNews.title} />
                                </div>

                                <div className="space-y-2 text-xs">
                                    <span className="text-secondary font-bold text-[10px] uppercase tracking-widest">{selectedNews.author} • {new Date(selectedNews.created_at).toLocaleDateString('id-ID', {day: 'numeric', month: 'long', year: 'numeric'})}</span>
                                    <h3 className="font-bold text-2xl text-primary font-serif leading-tight">{selectedNews.title}</h3>
                                </div>

                                <div className="border-t border-slate-100 pt-4 text-xs font-light text-slate-600 leading-relaxed space-y-4">
                                    <p>{selectedNews.content}</p>
                                    <p>RIT Hotel Yogyakarta senantiasa menghadirkan inovasi layanan terbaik untuk para tamu berharga kami. Terus pantau sosial media resmi kami untuk info acara eksklusif akhir pekan.</p>
                                </div>

                                <button onClick={() => setSelectedNews(null)} className="w-full bg-primary hover:bg-secondary text-white hover:text-primary py-3.5 rounded-xl font-bold text-xs uppercase tracking-wider transition-colors shadow-md">
                                    Tutup Artikel
                                </button>
                            </div>
                        </div>
                    )}

                    <footer className="bg-primary text-white border-t border-slate-900 mt-24">
                        <div className="border-t border-slate-900 py-6 text-center text-[10px] text-slate-500 font-light">
                            &copy; 2026 RIT Hotel Hotel Yogyakarta. Seluruh Hak Cipta Dilindungi. Tugas UTS Pemrograman Web - Kelompok 4.
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
